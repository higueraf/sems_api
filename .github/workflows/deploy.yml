name: 🚀 Deploy NestJS SEMS API to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_KEY }}
          source: "."
          target: "/opt/sems_api"

      - name: Run deploy commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          PRODUCTION_ENV: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_KEY }}
          envs: PRODUCTION_ENV
          script: |
            set -e
            cd /opt/sems_api

            export PATH="/root/n/bin:$PATH"

            echo "USER=$(whoami)"
            echo "HOME=$HOME"
            echo "PATH=$PATH"
            which node || true
            which npm || true
            node -v || true
            npm -v || true

            sudo lsof -t -i:3000 | xargs -r sudo kill -9 || true

            printf '%s' "$PRODUCTION_ENV" > .env

            if [ -f package-lock.json ]; then
              /root/n/bin/npm ci
            else
              /root/n/bin/npm install
            fi

            NODE_OPTIONS="--max-old-space-size=4096" /root/n/bin/npm run build

            pm2 stop sems-api || true
            pm2 delete sems-api || true
            pm2 start dist/main.js --name sems-api
            pm2 save